<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Face Mesh Vektor</title>
    <!-- Premium Fonts for Cyberpunk HUD -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        video,
        canvas {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        #video {
            transform: scaleX(-1);
        }

        #canvas {
            transform: scaleX(-1);
            z-index: 10;
        }

        /* Loading full screen overlay */
        #loader {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0; left: 0;
            background-color: #070913;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            color: #e2e8f0;
        }

        .scanner-hud {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed #00ffaa;
            box-shadow: 0 0 10px rgba(0, 255, 250, 0.2);
            animation: rotate-clockwise 15s linear infinite;
        }

        .scanner-ring-inner {
            position: absolute;
            width: 75%;
            height: 75%;
            border-radius: 50%;
            border: 1px dashed #00b3ff;
            border-top: 2px solid #00ffaa;
            border-bottom: 2px solid #00ffaa;
            animation: rotate-counter-clockwise 8s linear infinite;
        }

        .scanner-core {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #00ffaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ffaa;
            animation: pulse-core 2s ease-in-out infinite;
        }

        .scanner-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffaa, transparent);
            box-shadow: 0 0 15px #00ffaa;
            animation: scan-vertical 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes rotate-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-counter-clockwise {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulse-core {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes scan-vertical {
            0% { top: 10%; opacity: 0.3; }
            50% { top: 90%; opacity: 1; }
            100% { top: 10%; opacity: 0.3; }
        }

        .loader-percent {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #00ffaa;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.4);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .progress-container {
            width: 280px;
            height: 5px;
            background: rgba(0, 255, 170, 0.05);
            border: 1px solid rgba(0, 255, 170, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffaa, #00b3ff);
            box-shadow: 0 0 10px #00ffaa;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- 1. LOADING OVERLAY -->
    <div id="loader">
        <div class="scanner-hud">
            <div class="scanner-ring"></div>
            <div class="scanner-ring-inner"></div>
            <div class="scanner-core"></div>
            <div class="scanner-line"></div>
        </div>
        <div class="loader-percent" id="load-percent">0%</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
